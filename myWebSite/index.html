<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/nes.css@2.3.0/css/nes.min.css" rel="stylesheet">
    <title>SYNTHWAVE PORTFOLIO</title>
  </head>
  <body>
    <canvas class="webgl"></canvas>
    <div class="crt-overlay"></div>
    
    <div id="loading-screen" class="loading-screen">
      <div class="loading-content">
        <h1>加载中...</h1>
        <progress id="loading-progress" class="nes-progress is-success" value="0" max="100"></progress>
        <p id="loading-text">0%</p>
      </div>
    </div>
    
    <!-- 左侧垂直按钮组 - 开关按钮始终显示，播放控制可隐藏 -->
    <div class="left-button-group">
      <!-- 开关按钮 - 始终显示 -->
      <button id="toggle-ui-btn" class="toggle-ui-btn nes-btn is-success">
        <span id="toggle-ui-icon">🎛️</span>
        <span class="notification-dot"></span>
      </button>
      
      <!-- 播放控制按钮 - 可以控制显示隐藏 -->
      <div class="music-controls playback-controls hidden">
        <button id="music-btn" class="control-btn nes-btn is-primary">
          <span id="music-icon">▶</span>
        </button>
        <button id="next-btn" class="control-btn nes-btn is-primary">
          <span>▶▶</span>
        </button>
      </div>
    </div>
    
    <!-- 右上角上传按钮 - 可以控制显示隐藏 -->
    <div class="music-controls upload-section hidden">
      <label for="audio-file" class="upload-btn nes-btn is-success">
        🎵 上传音乐
      </label>
      <input type="file" id="audio-file" accept="audio/mp3" hidden>
    </div>
    
    <!-- 正在播放的白字 -->
    <div id="now-playing" class="now-playing hidden">
      <span>正在播放：</span>
      <span id="song-title"></span>
    </div>
    
    <div class="ui-container">
      <header class="header-bar">
        <h1>WELCOME</h1>
      </header>
    </div>

    <div class="button-container">
      <div class="top-buttons">
        <button id="about-btn" class="nes-btn is-success">关于我</button>
        <button id="works-btn" class="nes-btn is-success">作品展示</button>
        <button id="guestbook-btn" class="nes-btn is-success">留言板</button>
      </div>
      <button id="blog-btn" class="nes-btn is-success blog-btn-floating">Blog</button>
    </div>

    <!-- 管理员密码输入弹窗 -->
    <div id="admin-modal" class="modal-overlay hidden">
      <div class="admin-modal-content">
        <div class="nes-dialog admin-dialog">
          <span class="corner-tl"></span>
          <span class="corner-tr"></span>
          <span class="corner-bl"></span>
          <span class="corner-br"></span>
          <div class="admin-header">
            <h2>🔐 管理员认证</h2>
            <button id="close-admin-modal" class="nes-btn is-error close-btn">×</button>
          </div>
          <div class="admin-body">
            <p class="admin-hint">请输入管理员密码以启用编辑功能</p>
            <input type="password" id="admin-password-input" class="nes-input" placeholder="输入密码">
          </div>
          <div class="dialog-footer">
            <button id="admin-login-btn" class="nes-btn is-primary">🔓 进入管理模式</button>
          </div>
        </div>
      </div>
    </div>

    <div id="about-modal" class="modal-overlay hidden">
      <div class="about-modal-content">
        <div class="nes-dialog about-dialog">
          <span class="corner-tl"></span>
          <span class="corner-tr"></span>
          <span class="corner-bl"></span>
          <span class="corner-br"></span>
          <div class="about-header">
            <h2 class="modal-title">关于我</h2>
            <div class="about-header-right">
              <button id="admin-toggle-btn" class="nes-btn is-warning admin-toggle-btn">⚙️</button>
              <button id="close-modal" class="nes-btn is-error close-btn">×</button>
            </div>
          </div>
          <div class="about-body">
            <div class="profile-avatar-container">
              <div class="profile-avatar-frame">
                <img id="profile-avatar" src="https://images.unsplash.com/photo-1561948955-570b270e7c36?w=200&h=200&fit=crop" alt="Profile" class="profile-avatar">
                <input type="file" id="avatar-upload" accept="image/*" class="avatar-input">
                <button id="avatar-upload-btn" class="nes-btn is-primary avatar-upload-btn admin-only">📷 更换头像</button>
              </div>
            </div>
            <div class="about-sections">
              <div class="about-bio">
                <div class="bio-header">
                  <h3 class="bio-label">个人介绍</h3>
                  <div class="bio-controls admin-only">
                    <button id="edit-profile-btn" class="nes-btn is-warning edit-bio-btn">✏️ 编辑</button>
                    <button id="save-profile-btn" class="nes-btn is-success hidden save-bio-btn">💾 保存</button>
                    <button id="cancel-profile-btn" class="nes-btn is-error hidden cancel-bio-btn">❌ 取消</button>
                  </div>
                </div>
                <p id="profile-bio">
                  欢迎来到赛博网格！
                  <br><br>
                  我是一名数字艺术家和创意开发者，专注于3D视觉化、互动体验以及复古未来主义设计。
                  <br><br>
                  凭借对像素艺术、霓虹灯和合成波美学的热爱，我将数字梦境变成现实。
                </p>
                <textarea id="profile-bio-textarea" class="nes-textarea hidden" rows="6"></textarea>
              </div>
              <div class="skills-panel">
                <h3 class="skills-label">技能面板</h3>
                <div id="skills-container" class="skills-container"></div>
              </div>
            </div>
          </div>
          <div class="dialog-footer">
            <button id="close-modal-footer" class="nes-btn is-primary">关闭</button>
          </div>
        </div>
      </div>
    </div>

    <div id="gallery-modal" class="modal-overlay hidden">
      <div class="gallery-modal-content">
        <div class="nes-dialog gallery-dialog">
          <span class="corner-tl"></span>
          <span class="corner-tr"></span>
          <span class="corner-bl"></span>
          <span class="corner-br"></span>
          <div class="gallery-header">
            <h2 class="modal-title">我的作品</h2>
            <button id="close-gallery" class="nes-btn is-error close-btn">×</button>
          </div>
          <div id="project-cards-container" class="project-cards">
          </div>
        </div>
      </div>
    </div>

    <div id="blog-modal" class="modal-overlay hidden">
      <div class="blog-modal-content">
        <div class="nes-dialog blog-dialog">
          <span class="corner-tl"></span>
          <span class="corner-tr"></span>
          <span class="corner-bl"></span>
          <span class="corner-br"></span>
          <div class="blog-header">
            <h2 class="modal-title">📝 赛博博客</h2>
            <div class="blog-header-right">
              <button id="blog-admin-toggle-btn" class="nes-btn is-warning admin-toggle-btn">⚙️</button>
              <button id="close-blog" class="nes-btn is-error close-btn">×</button>
            </div>
          </div>
          <div class="blog-body">
            <div class="blog-sidebar">
              <div class="blog-sidebar-header">
                <h3 class="article-list-label">📌 文章列表</h3>
                <button id="add-blog-btn" class="nes-btn is-success admin-only" style="font-size: 0.6rem; padding: 0.3rem 0.5rem;">➕ 新建</button>
              </div>
              <div id="blog-list" class="blog-list"></div>
            </div>
            <div class="blog-content">
              <div id="blog-preview" class="blog-preview">
                <p class="select-article-hint">请选择左侧文章进行预览...</p>
              </div>
              <div id="blog-editor" class="blog-editor hidden">
                <input type="text" id="blog-title-input" class="nes-input" placeholder="文章标题">
                <input type="text" id="blog-date-input" class="nes-input" placeholder="日期 (YYYY-MM-DD)">
                <textarea id="blog-content-textarea" class="nes-textarea" rows="12" placeholder="文章内容 (支持换行)"></textarea>
                <div class="blog-editor-controls">
                  <button id="save-blog-btn" class="nes-btn is-success">💾 保存</button>
                  <button id="delete-blog-btn" class="nes-btn is-error admin-only">🗑️ 删除</button>
                  <button id="cancel-blog-edit-btn" class="nes-btn is-primary">❌ 取消</button>
                </div>
              </div>
            </div>
          </div>
          <div class="dialog-footer">
            <button id="close-blog-footer" class="nes-btn is-primary">关闭</button>
          </div>
        </div>
      </div>
    </div>

    <div id="guestbook-modal" class="modal-overlay hidden">
      <div class="guestbook-modal-content">
        <div class="nes-dialog guestbook-dialog">
          <span class="corner-tl"></span>
          <span class="corner-tr"></span>
          <span class="corner-bl"></span>
          <span class="corner-br"></span>
          <div class="guestbook-header">
            <h2 class="modal-title">📜 赛博留言板</h2>
            <button id="close-guestbook" class="nes-btn is-error close-btn">×</button>
          </div>
          <div class="guestbook-body">
              <div class="guestbook-status-bar">
                <span id="storage-status" class="storage-status">⚡ 检查连接中...</span>
                <button id="refresh-messages" class="nes-btn is-success refresh-btn">🔄 刷新</button>
              </div>
              <div class="guestbook-input">
                <h3 class="leave-message-label">✍️ 留下你的足迹</h3>
                <div class="input-row">
                  <input type="text" id="guest-name" class="nes-input name-input" placeholder="昵称（匿名网友）">
                  <label class="name-label hidden">昵称（匿名网友）</label>
                  <input type="text" id="guest-tag" class="nes-input tag-input" placeholder="标签（可选）">
                  <label class="tag-label hidden">标签（可选）</label>
                </div>
                <textarea id="guest-message" class="nes-textarea" id="message-input" placeholder="写下你的想法..."></textarea>
                <div class="input-footer">
                  <button id="submit-message" class="nes-btn is-primary" id="submit-message-btn">发送留言 🚀</button>
                </div>
              </div>
              <div class="guestbook-list">
                <h3 class="history-label">💬 历史留言</h3>
                <div id="loading-indicator" class="loading-indicator hidden">
                  <div class="spinner"></div>
                  <span>加载中...</span>
                </div>
                <div id="error-message" class="error-message hidden"></div>
                <div id="guest-messages" class="messages-container"></div>
              </div>
            </div>
          <div class="dialog-footer">
            <button id="close-guestbook-footer" class="nes-btn is-primary">关闭</button>
          </div>
        </div>
      </div>
    </div>

    <div id="project-modal" class="modal-overlay hidden">
      <div class="project-modal-content">
        <div class="nes-dialog project-dialog">
          <span class="corner-tl"></span>
          <span class="corner-tr"></span>
          <span class="corner-bl"></span>
          <span class="corner-br"></span>
          <div class="project-header">
            <h2 id="project-title">作品标题</h2>
            <button id="close-project" class="nes-btn is-error close-btn">×</button>
          </div>
          <div class="project-body">
            <div class="project-image-container">
              <img id="project-image" src="" alt="Project Image">
            </div>
            <div class="project-info">
              <p id="project-description" class="project-description"></p>
              <div id="project-tags" class="project-tags"></div>
            </div>
          </div>
          <div class="dialog-footer">
            <button id="close-project-btn" class="nes-btn is-primary">返回</button>
          </div>
        </div>
      </div>
    </div>

    <div id="app"></div>
    
    <div class="lang-switcher">
      <button id="lang-btn" class="lang-btn" title="切换语言 / Change Language / 言語切り替え">
        🌐
      </button>
      <div id="lang-dropdown" class="lang-dropdown">
        <div class="lang-option" data-lang="zh">
          <span class="flag">🇨🇳</span>
          <span>中文</span>
        </div>
        <div class="lang-option" data-lang="en">
          <span class="flag">🇬🇧</span>
          <span>English</span>
        </div>
        <div class="lang-option" data-lang="ja">
          <span class="flag">🇯🇵</span>
          <span>日本語</span>
        </div>
      </div>
    </div>
    
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
