<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEON FUTURE - Synthwave</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      overflow: hidden;
      background: #0d0221;
    }
    canvas {
      display: block;
    }
    .loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #ff00ff;
      font-family: 'Courier New', monospace;
      font-size: 24px;
      text-shadow: 0 0 20px #ff00ff;
      z-index: 100;
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">LOADING...</div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { FontLoader } from 'three/addons/loaders/FontLoader.js';
    import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';

    let scene, camera, renderer, composer;
    let textMesh, gridFloor;
    let bloomPass;
    const clock = new THREE.Clock();

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0d0221);
      scene.fog = new THREE.FogExp2(0x0d0221, 0.008);

      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 3, 15);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.toneMapping = THREE.ReinhardToneMapping;
      renderer.toneMappingExposure = 1.5;
      document.body.appendChild(renderer.domElement);

      const ambientLight = new THREE.AmbientLight(0xffffff, 0.1);
      scene.add(ambientLight);

      const pointLight = new THREE.PointLight(0xff00ff, 2, 100);
      pointLight.position.set(0, 5, 10);
      scene.add(pointLight);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;
      controls.minDistance = 5;
      controls.maxDistance = 50;

      composer = new EffectComposer(renderer);
      const renderPass = new RenderPass(scene, camera);
      composer.addPass(renderPass);

      bloomPass = new UnrealBloomPass(
        new THREE.Vector2(window.innerWidth, window.innerHeight),
        2.5,
        0.4,
        0.85
      );
      bloomPass.threshold = 0;
      bloomPass.strength = 2.5;
      bloomPass.radius = 1;
      composer.addPass(bloomPass);

      createGridFloor();
      loadFont();

      window.addEventListener('resize', onWindowResize);
    }

    function createGridFloor() {
      const gridGroup = new THREE.Group();

      const gridMaterial = new THREE.LineBasicMaterial({ 
        color: 0x00ffff,
        transparent: true,
        opacity: 0.8
      });

      const gridSize = 200;
      const gridDivisions = 100;
      const gridHelper = new THREE.GridHelper(gridSize, gridDivisions, 0x00ffff, 0x00ffff);
      gridHelper.material.transparent = true;
      gridHelper.material.opacity = 0.4;
      gridGroup.add(gridHelper);

      for (let i = 0; i < 20; i++) {
        const lineMaterial = new THREE.LineBasicMaterial({
          color: 0x00ffff,
          transparent: true,
          opacity: 0.6 - (i * 0.03)
        });

        const points = [];
        const z = -100 + (i * 10);
        points.push(new THREE.Vector3(-100, 0, z));
        points.push(new THREE.Vector3(100, 0, z));

        const geometry = new THREE.BufferGeometry().setFromPoints(points);
        const line = new THREE.Line(geometry, lineMaterial);
        gridGroup.add(line);
      }

      const planeGeometry = new THREE.PlaneGeometry(200, 200);
      const planeMaterial = new THREE.MeshBasicMaterial({
        color: 0x00ffff,
        transparent: true,
        opacity: 0.1,
        side: THREE.DoubleSide
      });
      const plane = new THREE.Mesh(planeGeometry, planeMaterial);
      plane.rotation.x = -Math.PI / 2;
      plane.position.y = -0.1;
      gridGroup.add(plane);

      gridGroup.position.y = -3;
      scene.add(gridGroup);
      gridFloor = gridGroup;
    }

    function loadFont() {
      const loader = new FontLoader();
      loader.load(
        'https://threejs.org/examples/fonts/helvetiker_bold.typeface.json',
        (font) => {
          createText(font);
          document.getElementById('loading').style.display = 'none';
        },
        undefined,
        (error) => {
          console.error('Error loading font:', error);
          document.getElementById('loading').textContent = 'FONT LOAD ERROR';
        }
      );
    }

    function createText(font) {
      const textGeometry = new TextGeometry('NEON FUTURE', {
        font: font,
        size: 2,
        height: 0.8,
        curveSegments: 12,
        bevelEnabled: true,
        bevelThickness: 0.1,
        bevelSize: 0.05,
        bevelOffset: 0,
        bevelSegments: 5
      });

      textGeometry.computeBoundingBox();
      const centerOffset = new THREE.Vector3();
      textGeometry.boundingBox.getCenter(centerOffset);
      textGeometry.translate(-centerOffset.x, -centerOffset.y, -centerOffset.z);

      const textMaterial = new THREE.MeshStandardMaterial({
        color: 0xff00ff,
        emissive: 0xff00ff,
        emissiveIntensity: 0.8,
        metalness: 0.8,
        roughness: 0.2
      });

      textMesh = new THREE.Mesh(textGeometry, textMaterial);
      textMesh.position.set(0, 3, 0);
      scene.add(textMesh);

      const wireframeMaterial = new THREE.MeshBasicMaterial({
        color: 0xff00ff,
        wireframe: true,
        transparent: true,
        opacity: 0.3
      });
      const wireframeMesh = new THREE.Mesh(textGeometry.clone(), wireframeMaterial);
      wireframeMesh.position.copy(textMesh.position);
      wireframeMesh.scale.multiplyScalar(1.01);
      scene.add(wireframeMesh);
    }

    function animate() {
      requestAnimationFrame(animate);

      const elapsedTime = clock.getElapsedTime();
      const delta = clock.getDelta();

      if (textMesh) {
        textMesh.position.y = 3 + Math.sin(elapsedTime * 0.8) * 0.3;
        textMesh.rotation.y = Math.sin(elapsedTime * 0.3) * 0.1;
      }

      if (gridFloor) {
        gridFloor.position.z += 0.3;
        if (gridFloor.position.z > 20) {
          gridFloor.position.z = 0;
        }
      }

      if (bloomPass) {
        const pulse = Math.sin(elapsedTime * 2) * 0.5 + 1.5;
        bloomPass.strength = pulse;
      }

      composer.render();
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    }

    init();
    animate();
  </script>
</body>
</html>
