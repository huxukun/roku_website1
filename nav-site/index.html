<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>AR NAV</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <!-- 3D 场景容器 -->
    <canvas class="webgl"></canvas>

    <!-- 导航信息层（AR 透明层） -->
    <div class="nav-layer">

      <!-- 左上角 3D 迷你地图 -->
      <div class="mini-map" id="mini-map">
        <div class="mini-map-info" id="mini-map-info">定位中...</div>
      </div>

      <!-- 顶部状态栏 -->
      <div class="status-bar">
        <div class="status-item">
          <span class="status-label">目的地</span>
          <span class="status-value" id="destination-display">未设置</span>
        </div>
        <div class="status-item status-compass">
          <span class="compass-arrow" id="compass-arrow">↑</span>
          <span class="compass-text" id="compass-text">N</span>
        </div>
      </div>

      <!-- 中央导航指示区 -->
      <div class="center-display">

        <!-- 大箭头指示 -->
        <div class="big-arrow-container">
          <div class="big-arrow" id="big-arrow">→</div>
          <div class="arrow-distance" id="arrow-distance">0.0 km</div>
          <div class="arrow-hint" id="arrow-hint">直行</div>
        </div>

      </div>

      <!-- 底部信息栏 -->
      <div class="bottom-panel">

        <div class="info-card info-main">
          <div class="info-row">
            <div class="info-item">
              <div class="info-icon">🚴</div>
              <div class="info-content">
                <div class="info-label">总距离</div>
                <div class="info-value" id="total-distance">-- km</div>
              </div>
            </div>
            <div class="info-item">
              <div class="info-icon">⏱</div>
              <div class="info-content">
                <div class="info-label">剩余时间</div>
                <div class="info-value" id="remain-time">-- min</div>
              </div>
            </div>
          </div>

          <div class="info-row">
            <div class="info-item">
              <div class="info-icon">📍</div>
              <div class="info-content">
                <div class="info-label">当前速度</div>
                <div class="info-value" id="current-speed">-- km/h</div>
              </div>
            </div>
            <div class="info-item">
              <div class="info-icon">🔄</div>
              <div class="info-content">
                <div class="info-label">下一个转弯</div>
                <div class="info-value" id="next-turn">--</div>
              </div>
            </div>
          </div>
        </div>

        <!-- 次要信息卡 -->
        <div class="info-card info-secondary">
          <div class="info-row">
            <div class="info-item small">
              <div class="info-icon">🌤️</div>
              <div class="info-content">
                <div class="info-label">天气</div>
                <div class="info-value" id="weather-info">--</div>
              </div>
            </div>
            <div class="info-item small">
              <div class="info-icon">🛣️</div>
              <div class="info-content">
                <div class="info-label">当前道路</div>
                <div class="info-value" id="traffic-light">定位中...</div>
              </div>
            </div>
            <div class="info-item small">
              <div class="info-icon">📏</div>
              <div class="info-content">
                <div class="info-label">已行驶</div>
                <div class="info-value" id="traveled">0 km</div>
              </div>
            </div>
          </div>
        </div>

      </div>

      <!-- 语音提示浮动层 -->
      <div class="voice-hint" id="voice-hint">
        <span id="voice-text">🔊 准备出发</span>
      </div>

      <!-- 传感器与定位状态指示 -->
      <div class="sensor-status">
        <div class="sensor-dot" id="gps-status" title="GPS"></div>
        <div class="sensor-dot" id="compass-status" title="指南针"></div>
        <div class="sensor-dot" id="gyro-status" title="陀螺仪"></div>
      </div>

    </div>

    <!-- 初始化提示层 -->
    <div class="init-overlay" id="init-overlay">
      <div class="init-content">
        <h1 class="init-title">AR NAV</h1>
        <p class="init-subtitle">骑行导航 · 极简科技风</p>

        <div class="init-step">
          <button class="start-btn" id="start-btn">
            🚴 开始导航
          </button>
        </div>

        <p class="init-hint">
          请在户外使用 · 需要定位权限 · 建议竖屏
        </p>

        <!-- 目的地输入 + POI 搜索 -->
        <div class="destination-input hidden" id="destination-box">
          <div style="position:relative;width:90vw;max-width:500px;margin:0 auto;">
            <input type="text" id="destination-input"
                   class="dest-input"
                   placeholder="输入目的地（例如：天安门）"
                   autocomplete="off" />
            <!-- POI 搜索结果下拉列表 -->
            <div class="poi-suggestions" id="poi-suggestions"></div>
            <button class="dest-btn" id="dest-confirm-btn">确定</button>
          </div>
        </div>

      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
